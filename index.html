        <!-- Service Worker Registration -->
        <script>
            // Registrar Service Worker tanto en desarrollo como en producción
            if ("serviceWorker" in navigator) {
                const isDev =
                    window.location.hostname.includes("localhost") ||
                    window.location.hostname.includes("127.0.0.1");

                window.addEventListener("load", async () => {
                    try {
                        // Esperar a que se carguen los módulos
                        await new Promise((resolve) =>
                            setTimeout(resolve, 500),
                        );

                        const registration =
                            await navigator.serviceWorker.register(
                                "service-worker.js",
                            );

                        if (isDev) {
                            console.log(
                                "🔧 Modo desarrollo: ServiceWorker registrado para pruebas offline",
                            );
                        } else {
                            console.log(
                                "✅ ServiceWorker registrado con éxito:",
                                registration.scope,
                            );
                        }

                        // Forzar actualización si hay nueva versión
                        registration.onupdatefound = () => {
                            const installingWorker = registration.installing;
                            installingWorker.onstatechange = async () => {
                                if (installingWorker.state === "installed") {
                                    if (navigator.serviceWorker.controller) {
                                        console.log(
                                            "🔄 Nueva versión disponible. Recargando...",
                                        );
                                        if (
                                            confirm(
                                                "¡Nueva versión disponible! ¿Recargar para actualizar?",
                                            )
                                        ) {
                                            window.location.reload();
                                        }
                                    } else {
                                        console.log(
                                            "✅ App está lista para funcionar offline",
                                        );
                                    }
                                }
                            };
                        };
                    } catch (error) {
                        console.error(
                            "❌ Error al registrar ServiceWorker:",
                            error,
                        );
                        console.warn(
                            "⚠️ La app funcionará pero sin modo offline",
                        );
                    }
                });
            } else {
                console.warn("⚠️ ServiceWorker no soportado en este navegador");
            }
        </script>
    </body>
